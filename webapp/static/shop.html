<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>积分商城 — 老王工具箱</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg: var(--tg-theme-bg-color, #0a0a0f);
  --text: var(--tg-theme-text-color, #e8e8ed);
  --hint: var(--tg-theme-hint-color, #6e6e80);
  --link: var(--tg-theme-link-color, #7c6aef);
  --btn: var(--tg-theme-button-color, #7c6aef);
  --btn-text: var(--tg-theme-button-text-color, #fff);
  --card: var(--tg-theme-secondary-bg-color, #131320);
  --gold: #f5c842;
  --silver: #a8b4c2;
  --diamond: #7c6aef;
  --crown: #f5a623;
  --success: #34c759;
  --danger: #ff453a;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
  background: var(--bg); color: var(--text);
  padding: 0 0 100px 0;
  -webkit-font-smoothing: antialiased;
}

/* Header */
.header {
  background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
  padding: 24px 20px 20px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.header::before {
  content: ''; position: absolute; top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(circle, rgba(124,106,239,0.08) 0%, transparent 60%);
}
.header .points {
  font-size: 42px; font-weight: 800;
  background: linear-gradient(135deg, var(--gold), #ffd700, var(--gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  position: relative;
}
.header .points-label { font-size: 13px; color: var(--hint); margin-top: 2px; }
.header .tier-badge {
  display: inline-block; margin-top: 10px; padding: 4px 14px;
  border-radius: 20px; font-size: 12px; font-weight: 600;
  letter-spacing: 0.5px;
}
.tier-free { background: rgba(255,255,255,0.08); color: var(--hint); }
.tier-member { background: rgba(124,106,239,0.2); color: var(--diamond); border: 1px solid rgba(124,106,239,0.3); }
.tier-vip { background: rgba(245,166,35,0.15); color: var(--crown); border: 1px solid rgba(245,166,35,0.3); }

/* Section */
.section { padding: 16px 16px 0; }
.section-title {
  font-size: 15px; font-weight: 700; margin-bottom: 12px;
  display: flex; align-items: center; gap: 6px;
}
.section-title .line {
  flex: 1; height: 1px;
  background: linear-gradient(90deg, rgba(255,255,255,0.1), transparent);
}

/* Item cards */
.items { display: flex; flex-direction: column; gap: 10px; }
.item {
  background: var(--card);
  border-radius: 14px;
  padding: 14px 16px;
  display: flex; align-items: center; gap: 14px;
  transition: transform 0.15s, box-shadow 0.15s;
  cursor: pointer;
  border: 1px solid rgba(255,255,255,0.04);
}
.item:active { transform: scale(0.98); }
.item.affordable { border-color: rgba(124,106,239,0.2); }
.item .icon {
  width: 44px; height: 44px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
  background: rgba(255,255,255,0.05);
}
.item .info { flex: 1; min-width: 0; }
.item .name { font-size: 14px; font-weight: 600; }
.item .desc { font-size: 11px; color: var(--hint); margin-top: 2px; }
.item .price-tag {
  font-size: 13px; font-weight: 700; color: var(--gold);
  white-space: nowrap; flex-shrink: 0;
}
.item.affordable .price-tag { color: var(--success); }
.item .price-tag .unit { font-size: 10px; font-weight: 400; color: var(--hint); }

/* Locked section */
.locked-banner {
  background: linear-gradient(135deg, rgba(124,106,239,0.08), rgba(245,166,35,0.05));
  border: 1px dashed rgba(255,255,255,0.1);
  border-radius: 14px; padding: 16px; text-align: center;
  margin: 8px 16px 16px;
}
.locked-banner .lock-icon { font-size: 28px; margin-bottom: 6px; }
.locked-banner .lock-text { font-size: 13px; color: var(--hint); line-height: 1.5; }
.locked-banner .upgrade-btn {
  display: inline-block; margin-top: 10px; padding: 8px 24px;
  background: var(--btn); color: var(--btn-text); border: none;
  border-radius: 20px; font-size: 13px; font-weight: 600;
  cursor: pointer;
}

/* Redeem modal */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.6); z-index: 100;
  align-items: flex-end; justify-content: center;
  backdrop-filter: blur(4px);
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--card); border-radius: 20px 20px 0 0;
  padding: 24px 20px 40px; width: 100%; max-width: 500px;
  animation: slideUp 0.25s ease-out;
}
@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
.modal .modal-icon { text-align: center; font-size: 48px; margin-bottom: 12px; }
.modal .modal-title { text-align: center; font-size: 17px; font-weight: 700; }
.modal .modal-desc { text-align: center; font-size: 13px; color: var(--hint); margin-top: 4px; }
.modal .modal-cost {
  text-align: center; font-size: 24px; font-weight: 800;
  color: var(--gold); margin: 16px 0;
}
.modal .modal-btns { display: flex; gap: 10px; margin-top: 16px; }
.modal .btn {
  flex: 1; padding: 14px; border: none; border-radius: 12px;
  font-size: 15px; font-weight: 600; cursor: pointer;
}
.modal .btn-cancel { background: rgba(255,255,255,0.08); color: var(--text); }
.modal .btn-confirm { background: var(--btn); color: var(--btn-text); }
.modal .btn-confirm:disabled { opacity: 0.4; }

/* Toast */
.toast {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  background: var(--success); color: #fff; padding: 10px 24px;
  border-radius: 20px; font-size: 14px; font-weight: 600;
  z-index: 200; display: none;
  box-shadow: 0 4px 20px rgba(52,199,89,0.3);
}
.toast.show { display: block; animation: fadeIn 0.2s ease-out; }
@keyframes fadeIn { from { opacity: 0; transform: translate(-50%, -10px); } to { opacity: 1; transform: translate(-50%, 0); } }

.loading { text-align: center; padding: 40px; color: var(--hint); font-size: 14px; }
</style>
</head>
<body>

<div class="header" id="header">
  <div class="points" id="pts">--</div>
  <div class="points-label">可用积分</div>
  <div class="tier-badge tier-free" id="tier-badge">加载中</div>
</div>

<div id="shop-content">
  <div class="loading">加载商城中...</div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-icon" id="m-icon">🎁</div>
    <div class="modal-title" id="m-title">--</div>
    <div class="modal-desc" id="m-desc">--</div>
    <div class="modal-cost" id="m-cost">-- 积分</div>
    <div class="modal-btns">
      <button class="btn btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn btn-confirm" id="m-btn" onclick="doRedeem()">确认兑换</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">✅ 兑换成功!</div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const initData = tg.initData;
const headers = {
  'Authorization': 'tma ' + initData,
  'Content-Type': 'application/json'
};

let userPoints = 0;
let selectedReward = null;

// Emoji from reward name
function getEmoji(name) {
  const match = name.match(/^(\S+)\s/);
  return match ? match[1] : '🎁';
}

async function loadShop() {
  try {
    const r = await fetch('/api/shop', { headers });
    const d = await r.json();
    userPoints = d.points;

    document.getElementById('pts').textContent = d.points.toLocaleString();

    const tierNames = { free: '🆓 免费用户', member: '💎 会员', vip: '👑 私董会', admin: '⚡ 管理员' };
    const tierClasses = { free: 'tier-free', member: 'tier-member', vip: 'tier-vip', admin: 'tier-vip' };
    const badge = document.getElementById('tier-badge');
    badge.textContent = tierNames[d.tier] || '免费用户';
    badge.className = 'tier-badge ' + (tierClasses[d.tier] || 'tier-free');

    let html = '';
    d.sections.forEach(sec => {
      html += `<div class="section">
        <div class="section-title">${sec.title}<div class="line"></div></div>
        <div class="items">`;
      sec.items.forEach(item => {
        const afford = userPoints >= item.cost;
        const emoji = getEmoji(item.name);
        const nameClean = item.name.replace(/^\S+\s/, '');
        html += `<div class="item ${afford ? 'affordable' : ''}"
          onclick="openModal('${item.id}','${emoji}','${nameClean.replace(/'/g,"\\'")}','${item.desc.replace(/'/g,"\\'")}',${item.cost})">
          <div class="icon">${emoji}</div>
          <div class="info">
            <div class="name">${nameClean}</div>
            <div class="desc">${item.desc}</div>
          </div>
          <div class="price-tag">${item.cost.toLocaleString()} <span class="unit">分</span></div>
        </div>`;
      });
      html += '</div></div>';
    });

    // Locked sections hint
    if (d.tier === 'free') {
      html += `<div class="locked-banner">
        <div class="lock-icon">🔒</div>
        <div class="lock-text">开通会员解锁 MacBook / iPhone 等高端奖品<br>升级私董会解锁 现金提现 / 老王线下交流</div>
        <button class="upgrade-btn" onclick="tg.close()">了解会员权益</button>
      </div>`;
    } else if (d.tier === 'member') {
      html += `<div class="locked-banner">
        <div class="lock-icon">👑</div>
        <div class="lock-text">升级私董会解锁现金提现、线下交流、导师计划</div>
        <button class="upgrade-btn" onclick="tg.close()">了解私董会</button>
      </div>`;
    }

    document.getElementById('shop-content').innerHTML = html;
  } catch(e) {
    document.getElementById('shop-content').innerHTML = '<div class="loading">加载失败，请重试</div>';
  }
}

function openModal(id, emoji, name, desc, cost) {
  selectedReward = { id, cost };
  document.getElementById('m-icon').textContent = emoji;
  document.getElementById('m-title').textContent = name;
  document.getElementById('m-desc').textContent = desc;
  document.getElementById('m-cost').textContent = cost.toLocaleString() + ' 积分';
  const btn = document.getElementById('m-btn');
  if (userPoints < cost) {
    btn.disabled = true;
    btn.textContent = '积分不足';
  } else {
    btn.disabled = false;
    btn.textContent = '确认兑换';
  }
  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  selectedReward = null;
}

async function doRedeem() {
  if (!selectedReward) return;
  const btn = document.getElementById('m-btn');
  btn.disabled = true;
  btn.textContent = '兑换中...';

  try {
    const r = await fetch('/api/redeem', {
      method: 'POST', headers,
      body: JSON.stringify({ id: selectedReward.id }),
    });
    if (!r.ok) {
      const err = await r.json();
      alert(err.detail || '兑换失败');
      closeModal();
      return;
    }
    const d = await r.json();
    userPoints = d.remaining_points;
    document.getElementById('pts').textContent = d.remaining_points.toLocaleString();

    closeModal();

    // Show toast
    const toast = document.getElementById('toast');
    toast.textContent = '✅ ' + d.reward + ' 兑换成功!';
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);

    // Reload shop
    setTimeout(loadShop, 500);
  } catch(e) {
    alert('网络错误，请重试');
    closeModal();
  }
}

// Close modal on overlay click
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

loadShop();
</script>
</body>
</html>
