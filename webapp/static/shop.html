<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>积分商城 — 老王工具箱</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg: var(--tg-theme-bg-color, #09090b);
  --text: var(--tg-theme-text-color, #fafafa);
  --hint: var(--tg-theme-hint-color, #71717a);
  --link: var(--tg-theme-link-color, #a78bfa);
  --btn: var(--tg-theme-button-color, #7c3aed);
  --btn-text: var(--tg-theme-button-text-color, #fff);
  --card: var(--tg-theme-secondary-bg-color, #18181b);
  --border: rgba(255,255,255,0.06);
  --gold: #fbbf24;
  --emerald: #34d399;
  --purple: #a78bfa;
  --rose: #fb7185;
  --sky: #38bdf8;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',system-ui,sans-serif;
  background:var(--bg);color:var(--text);
  padding:0 0 100px;
  -webkit-font-smoothing:antialiased;
}

/* ── Header ── */
.hero{
  position:relative;padding:32px 20px 24px;text-align:center;
  background:linear-gradient(160deg,#1e1b4b 0%,#312e81 40%,#4c1d95 100%);
  overflow:hidden;
}
.hero::after{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%,rgba(167,139,250,0.15),transparent 70%);
}
.hero *{position:relative;z-index:1}
.hero .pts{
  font-size:48px;font-weight:800;letter-spacing:-1px;
  background:linear-gradient(135deg,#fbbf24,#f59e0b,#fbbf24);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.hero .pts-label{font-size:13px;color:rgba(255,255,255,0.5);margin-top:4px;letter-spacing:1px;text-transform:uppercase}
.tier-pill{
  display:inline-flex;align-items:center;gap:4px;margin-top:12px;
  padding:6px 16px;border-radius:100px;font-size:12px;font-weight:600;
  backdrop-filter:blur(8px);
}
.tier-free{background:rgba(255,255,255,0.08);color:var(--hint)}
.tier-member{background:rgba(124,58,237,0.25);color:#c4b5fd;border:1px solid rgba(124,58,237,0.4)}
.tier-vip{background:rgba(251,191,36,0.15);color:#fcd34d;border:1px solid rgba(251,191,36,0.3)}

/* ── Section ── */
.section{padding:20px 16px 0}
.section-head{
  display:flex;align-items:center;gap:8px;margin-bottom:14px;
}
.section-title{font-size:16px;font-weight:700;white-space:nowrap}
.section-line{flex:1;height:1px;background:linear-gradient(90deg,var(--border),transparent)}

/* ── Product Grid ── */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.product{
  background:var(--card);border-radius:16px;padding:14px;
  display:flex;flex-direction:column;align-items:center;
  border:1px solid var(--border);
  transition:transform 0.15s,border-color 0.15s;
  cursor:pointer;position:relative;overflow:hidden;
}
.product:active{transform:scale(0.97)}
.product.can-buy{border-color:rgba(124,58,237,0.3)}
.product.can-buy::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(124,58,237,0.06),transparent);
}
.product .img-wrap{
  width:64px;height:64px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;
  font-size:32px;margin-bottom:8px;position:relative;
}
/* 不同类型的背景渐变 */
.img-wrap.digital{background:linear-gradient(135deg,#1e1b4b,#312e81)}
.img-wrap.physical{background:linear-gradient(135deg,#1c1917,#292524)}
.img-wrap.service{background:linear-gradient(135deg,#064e3b,#065f46)}
.img-wrap.premium{background:linear-gradient(135deg,#451a03,#78350f)}
.img-wrap.cash{background:linear-gradient(135deg,#14532d,#166534)}
.img-wrap.ai{background:linear-gradient(135deg,#172554,#1e3a5f)}

.product .name{
  font-size:12px;font-weight:600;text-align:center;
  line-height:1.3;min-height:32px;
  display:flex;align-items:center;
}
.product .price{
  margin-top:6px;font-size:13px;font-weight:800;
  color:var(--gold);
}
.product .price .u{font-size:10px;font-weight:400;color:var(--hint)}
.product.can-buy .price{color:var(--emerald)}

/* Full width item (for expensive/featured) */
.grid .featured{grid-column:1/-1;flex-direction:row;gap:14px;padding:16px}
.featured .img-wrap{width:56px;height:56px;font-size:28px;margin-bottom:0;flex-shrink:0}
.featured .info{flex:1;text-align:left}
.featured .name{min-height:auto;font-size:13px}
.featured .desc{font-size:11px;color:var(--hint);margin-top:2px}
.featured .price{margin-top:4px}

/* ── Locked Banner ── */
.locked{
  margin:12px 16px;padding:20px;border-radius:16px;text-align:center;
  background:linear-gradient(135deg,rgba(124,58,237,0.06),rgba(251,191,36,0.04));
  border:1px dashed rgba(255,255,255,0.08);
}
.locked .icon{font-size:32px;margin-bottom:8px}
.locked .msg{font-size:13px;color:var(--hint);line-height:1.5}
.locked .btn-up{
  display:inline-block;margin-top:12px;padding:10px 28px;
  background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff;
  border:none;border-radius:100px;font-size:13px;font-weight:600;
  cursor:pointer;
}

/* ── Modal ── */
.overlay{
  display:none;position:fixed;inset:0;z-index:100;
  background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);
  align-items:flex-end;justify-content:center;
}
.overlay.show{display:flex}
.modal{
  background:var(--card);border-radius:24px 24px 0 0;
  padding:28px 24px 40px;width:100%;max-width:500px;
  animation:up .25s ease-out;
}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal .m-img{text-align:center;font-size:56px;margin-bottom:12px}
.modal .m-name{text-align:center;font-size:18px;font-weight:700}
.modal .m-desc{text-align:center;font-size:13px;color:var(--hint);margin-top:4px}
.modal .m-cost{
  text-align:center;font-size:28px;font-weight:800;
  color:var(--gold);margin:18px 0;
}
.modal .m-balance{text-align:center;font-size:12px;color:var(--hint);margin-bottom:16px}
.modal .btns{display:flex;gap:10px}
.modal .b{
  flex:1;padding:15px;border:none;border-radius:14px;
  font-size:15px;font-weight:600;cursor:pointer;
}
.modal .b-no{background:rgba(255,255,255,0.06);color:var(--text)}
.modal .b-yes{background:linear-gradient(135deg,#7c3aed,#6d28d9);color:#fff}
.modal .b-yes:disabled{opacity:0.3}

/* ── Toast ── */
.toast{
  position:fixed;top:20px;left:50%;transform:translateX(-50%);
  background:var(--emerald);color:#000;padding:12px 28px;
  border-radius:100px;font-size:14px;font-weight:700;
  z-index:200;display:none;
  box-shadow:0 8px 30px rgba(52,211,153,0.3);
}
.toast.show{display:block;animation:fadeIn .2s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translate(-50%,-10px)}to{opacity:1;transform:translate(-50%,0)}}
</style>
</head>
<body>

<div class="hero">
  <div class="pts" id="pts">--</div>
  <div class="pts-label">可用积分</div>
  <div class="tier-pill tier-free" id="tier">加载中</div>
</div>

<div id="content"><div style="text-align:center;padding:40px;color:var(--hint)">加载商城中...</div></div>

<div class="overlay" id="modal">
  <div class="modal">
    <div class="m-img" id="mi">🎁</div>
    <div class="m-name" id="mn">--</div>
    <div class="m-desc" id="md">--</div>
    <div class="m-cost" id="mc">-- 积分</div>
    <div class="m-balance" id="mb">余额: --</div>
    <div class="btns">
      <button class="b b-no" onclick="closeM()">取消</button>
      <button class="b b-yes" id="mbtn" onclick="redeem()">确认兑换</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">✅ 兑换成功!</div>

<script>
const tg=window.Telegram.WebApp;tg.ready();tg.expand();
const H={'Authorization':'tma '+tg.initData,'Content-Type':'application/json'};
let pts=0,sel=null;

// 商品图标背景分类
const bgMap={
  shield_1:'service',health_shield:'service',extra_5:'service',
  wallpaper_1:'digital',checklist_1:'digital',book_1:'digital',template_1:'digital',notion_1:'digital',member_7:'service',
  band_1:'physical',earphone_1:'physical',keyboard_1:'physical',lamp_1:'physical',kindle_1:'physical',
  member_30:'service',consult_discount:'service',consult_15:'service',
  charger_1:'physical',mouse_1:'physical',speaker_1:'physical',
  airpods_1:'physical',watch_1:'physical',ipad_1:'physical',iphone_1:'physical',macbook_1:'physical',sony_1:'physical',
  vip_extend_30:'service',claude_3m:'ai',chatgpt_3m:'ai',cursor_3m:'ai',
  cash_100:'cash',cash_500:'cash',offline_meet:'premium',dinner_wang:'premium',
  mentorship_1m:'premium',macpro_1:'physical'
};

function em(n){const m=n.match(/^(\S+)\s/);return m?m[1]:'🎁'}
function cn(n){return n.replace(/^\S+\s/,'')}

// 高价商品用featured样式（全宽）
const featuredIds=new Set(['macbook_1','iphone_1','macpro_1','mentorship_1m','dinner_wang','cash_500']);

async function load(){
  try{
    const r=await fetch('/api/shop',{headers:H});
    const d=await r.json();
    pts=d.points;
    document.getElementById('pts').textContent=pts.toLocaleString();
    const tn={free:'🆓 免费用户',member:'💎 会员',vip:'👑 私董会',admin:'⚡ 管理员'};
    const tc={free:'tier-free',member:'tier-member',vip:'tier-vip',admin:'tier-vip'};
    const t=document.getElementById('tier');
    t.textContent=tn[d.tier]||'免费';
    t.className='tier-pill '+(tc[d.tier]||'tier-free');

    let h='';
    d.sections.forEach(sec=>{
      h+=`<div class="section"><div class="section-head"><div class="section-title">${sec.title}</div><div class="section-line"></div></div><div class="grid">`;
      sec.items.forEach(it=>{
        const e=em(it.name),name=cn(it.name),ok=pts>=it.cost;
        const bg=bgMap[it.id]||'digital';
        const feat=featuredIds.has(it.id);
        if(feat){
          h+=`<div class="product featured ${ok?'can-buy':''}" onclick="open_m('${it.id}','${e}','${name.replace(/'/g,"\\'")}','${it.desc.replace(/'/g,"\\'")}',${it.cost})">
            <div class="img-wrap ${bg}">${e}</div>
            <div class="info"><div class="name">${name}</div><div class="desc">${it.desc}</div>
            <div class="price">${it.cost.toLocaleString()} <span class="u">积分</span></div></div></div>`;
        }else{
          h+=`<div class="product ${ok?'can-buy':''}" onclick="open_m('${it.id}','${e}','${name.replace(/'/g,"\\'")}','${it.desc.replace(/'/g,"\\'")}',${it.cost})">
            <div class="img-wrap ${bg}">${e}</div>
            <div class="name">${name}</div>
            <div class="price">${it.cost.toLocaleString()} <span class="u">积分</span></div></div>`;
        }
      });
      h+='</div></div>';
    });

    if(d.tier==='free'){
      h+=`<div class="locked"><div class="icon">🔒</div><div class="msg">开通会员解锁高端数码奖品<br>MacBook · iPhone · AirPods · Apple Watch</div><button class="btn-up" onclick="tg.close()">了解会员权益</button></div>`;
    }else if(d.tier==='member'){
      h+=`<div class="locked"><div class="icon">👑</div><div class="msg">升级私董会解锁顶级权益<br>现金提现 · 老王线下 · 导师计划</div><button class="btn-up" onclick="tg.close()">了解私董会</button></div>`;
    }
    document.getElementById('content').innerHTML=h;
  }catch(e){document.getElementById('content').innerHTML='<div style="text-align:center;padding:40px;color:var(--hint)">加载失败</div>'}
}

function open_m(id,e,n,d,c){
  sel={id,cost:c};
  document.getElementById('mi').textContent=e;
  document.getElementById('mn').textContent=n;
  document.getElementById('md').textContent=d;
  document.getElementById('mc').textContent=c.toLocaleString()+' 积分';
  document.getElementById('mb').textContent='当前余额: '+pts.toLocaleString()+' 积分';
  const b=document.getElementById('mbtn');
  if(pts<c){b.disabled=true;b.textContent='积分不足'}
  else{b.disabled=false;b.textContent='确认兑换'}
  document.getElementById('modal').classList.add('show');
}
function closeM(){document.getElementById('modal').classList.remove('show');sel=null}

async function redeem(){
  if(!sel)return;
  const b=document.getElementById('mbtn');b.disabled=true;b.textContent='兑换中...';
  try{
    const r=await fetch('/api/redeem',{method:'POST',headers:H,body:JSON.stringify({id:sel.id})});
    if(!r.ok){const e=await r.json();alert(e.detail||'失败');closeM();return}
    const d=await r.json();pts=d.remaining_points;
    document.getElementById('pts').textContent=pts.toLocaleString();
    closeM();
    const t=document.getElementById('toast');
    t.textContent='✅ '+d.reward+' 兑换成功!';
    t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);
    setTimeout(load,500);
  }catch(e){alert('网络错误');closeM()}
}

document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeM()});
load();
</script>
</body>
</html>
